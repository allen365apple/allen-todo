<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>柏文的待辦清單</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --bg:#f6f4ef; --card:#fffdf9; --ink:#2f2b26; --sub:#8a8175; --line:#e7e1d6;
    --urgent:#d9534f; --today:#e0a800; --soon:#4f9d69; --low:#9a9488; --wait:#c8c2b6;
    --reply:#8a6bbf; --revise:#e08a3c; --shadow:0 1px 3px rgba(0,0,0,.06);
    color-scheme:light;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding:24px 16px 80px;max-width:820px;margin:0 auto;font-size:15px}
  .hidden{display:none !important}
  .gate{min-height:70vh;display:flex;align-items:center;justify-content:center}
  .gate-card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:36px 32px;text-align:center;max-width:360px;width:100%}
  .gate-card h1{font-size:20px;margin-bottom:8px}
  .gate-card p{color:var(--sub);font-size:14px;margin-bottom:20px}
  .g_id_signin{display:flex;justify-content:center}
  .gate-btn{margin-top:12px;background:var(--ink);color:#fff;border:none;border-radius:99px;padding:8px 20px;font-size:14px;cursor:pointer}
  .spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--ink);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  header{margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  header h1{font-size:22px;font-weight:700;letter-spacing:.5px}
  .updated{color:var(--sub);font-size:13px;margin-top:4px}
  .user-info{display:flex;align-items:center;gap:8px}
  .user-info img{width:32px;height:32px;border-radius:50%}
  .user-info .uname{font-size:13px;font-weight:600}
  .logout{font-size:12px;color:var(--sub);background:none;border:1px solid var(--line);border-radius:99px;padding:3px 12px;cursor:pointer}
  .progress-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 18px;margin:16px 0 24px;box-shadow:var(--shadow);display:flex;gap:22px;flex-wrap:wrap}
  .progress-card .stat{display:flex;flex-direction:column}
  .progress-card .num{font-size:22px;font-weight:700}
  .progress-card .lbl{font-size:12px;color:var(--sub)}
  .bar{flex:1 1 100%;height:8px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:6px}
  .bar>i{display:block;height:100%;background:var(--soon);width:0;transition:width .3s}
  h2.sec{font-size:15px;font-weight:700;margin:26px 0 10px;padding-left:10px;border-left:4px solid var(--ink)}
  .clear-note{text-align:center;color:var(--sub);font-size:14px;padding:24px 12px;background:var(--card);border:1px dashed var(--line);border-radius:12px}
  .date-section{margin-bottom:20px}
  .date-header{font-size:14px;font-weight:700;background:#efe9df;border-radius:8px;padding:6px 12px;display:inline-block;margin-bottom:8px}
  .date-header .wk{color:var(--sub);font-weight:500;margin-left:6px}
  ul.meeting-list{list-style:none;margin:0 0 10px}
  ul.meeting-list li{display:flex;align-items:center;gap:10px;background:#f2f6f3;border:1px solid #dde8e0;border-radius:8px;padding:6px 12px;margin-bottom:6px;font-size:14px}
  .meeting-time{font-variant-numeric:tabular-nums;font-weight:600;color:#3d7a54;white-space:nowrap}
  .meeting-title{flex:1}
  .meeting-link{font-size:12px;color:#3d7a54;text-decoration:none;border:1px solid #cfe0d5;border-radius:6px;padding:2px 8px;white-space:nowrap}
  .meeting-empty{font-size:13px;color:var(--sub);font-style:italic;margin-bottom:8px}
  ul.todo-list{list-style:none}
  ul.todo-list>li{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;box-shadow:var(--shadow);transition:opacity .25s,transform .25s}
  ul.todo-list>li.leaving{opacity:0;transform:translateX(12px)}
  input[type=checkbox]{width:18px;height:18px;margin-top:3px;flex-shrink:0;accent-color:var(--soon);cursor:pointer}
  .text{flex:1;min-width:0}
  .title-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .priority{font-size:11px;font-weight:700;color:#fff;border-radius:6px;padding:2px 8px;white-space:nowrap}
  .p-urgent{background:var(--urgent)} .p-today{background:var(--today)} .p-soon{background:var(--soon)}
  .p-low{background:var(--low)} .p-wait{background:#efeae0;color:var(--sub)} .p-reply{background:var(--reply)} .p-revise{background:var(--revise)}
  .proj{font-size:12px;color:var(--sub);background:#efe9df;border-radius:6px;padding:2px 7px}
  .task-name{font-weight:600;font-size:15px}
  .src-dm{font-size:11px;color:#b06a2c;background:#fbeede;border:1px solid #f0dcc3;border-radius:6px;padding:1px 6px}
  .meta{display:block;margin-top:6px;font-size:13px;color:var(--sub)}
  .meta .row{display:block}
  .meta .label{display:inline-block;min-width:64px;color:var(--sub)}
  .meta .value{color:var(--ink)}
  .meta .note{display:block;margin-top:3px;color:var(--sub);font-style:italic}
  .meta a{color:var(--reply);text-decoration:none}
  details.fold{margin-top:22px;border:1px solid var(--line);border-radius:12px;background:var(--card);overflow:hidden}
  details.fold>summary{cursor:pointer;padding:12px 16px;font-weight:700;font-size:14px;list-style:none;display:flex;justify-content:space-between}
  details.fold>summary::-webkit-details-marker{display:none}
  details.fold>summary .arw{color:var(--sub)}
  details.fold>.fold-body{padding:6px 14px 14px}
  ul.done-list{list-style:none}
  ul.done-list>li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px dashed var(--line)}
  ul.done-list>li:last-child{border-bottom:none}
  ul.done-list .task-name{font-weight:500;font-size:14px;color:var(--sub);text-decoration:line-through}
  ul.done-list .proj{font-size:11px}
  .note-box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
  .note-box textarea{width:100%;min-height:80px;border:1px solid var(--line);border-radius:8px;padding:10px;font:inherit;color:var(--ink);resize:vertical;background:#fffef9}
  .note-actions{display:flex;align-items:center;gap:10px;margin-top:8px}
  .note-actions button{background:var(--ink);color:#fff;border:none;border-radius:99px;padding:6px 18px;font-size:13px;cursor:pointer}
  .note-status{font-size:12px;color:var(--sub)}
  .done-month{padding:2px 0 8px}
  .done-month h4{font-size:12px;color:var(--sub);margin-bottom:4px}
  .done-month li{font-size:13px;color:var(--sub);padding:5px 0;border-bottom:1px dashed var(--line);text-decoration:line-through;list-style:none}
  footer{margin-top:30px;text-align:center;color:var(--sub);font-size:12px}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;pointer-events:none;transition:.25s;z-index:50}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (max-width:480px){ header{flex-direction:column} .user-info{align-self:flex-end} }
</style>
</head>
<body>

<div id="view-login" class="gate">
  <div class="gate-card">
    <h1>☀️ 柏文的待辦清單</h1>
    <p>請使用 Google 帳號登入</p>
    <div id="g_id_onload"
         data-client_id="779630921524-04oa01rc8idevffihel62tq864dbhoa9.apps.googleusercontent.com"
         data-callback="handleGoogleSignIn"
         data-auto_prompt="false"></div>
    <div class="g_id_signin" data-type="standard" data-theme="outline" data-size="large" data-text="signin_with" data-locale="zh_TW"></div>
  </div>
</div>

<div id="view-loading" class="gate hidden">
  <div class="gate-card"><div class="spinner"></div><p>驗證權限、載入資料中…</p></div>
</div>

<div id="view-denied" class="gate hidden">
  <div class="gate-card"><h1>🚫 你沒有權限登入</h1><p>此頁面僅限授權帳號使用</p>
  <button class="gate-btn" onclick="handleLogout()">用其他帳號登入</button></div>
</div>

<div id="view-error" class="gate hidden">
  <div class="gate-card"><h1>⚠️ 權限驗證失敗</h1><p id="error-msg">連線發生問題，請重試</p>
  <button class="gate-btn" onclick="location.reload()">重試</button></div>
</div>

<div id="view-app" class="hidden">
  <header>
    <div>
      <h1>☀️ 柏文的待辦清單</h1>
      <div class="updated" id="updated"></div>
    </div>
    <div class="user-info">
      <img id="u-pic" referrerpolicy="no-referrer" alt="">
      <span class="uname" id="u-name"></span>
      <button class="logout" onclick="handleLogout()">登出</button>
    </div>
  </header>
  <div class="progress-card" id="progress"></div>
  <div id="content"></div>
  <footer>勾選/筆記即時存進 Google Sheets ・ 資料每早自動更新 ・ v8.0</footer>
</div>

<div id="toast"></div>

<script>
var GOOGLE_CLIENT_ID = '779630921524-04oa01rc8idevffihel62tq864dbhoa9.apps.googleusercontent.com';
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw_Q9mZSFYPT91Zd_x-0jkGxcb6Sx181puu3W__F7E1dgdcSLHrBr5Nsl0YdypJdeUmtg/exec';
var SESSION_KEY = 'todo_session_v1';
var SESSION_HOURS = 24;
var SESSION = null;
var DONE_MAP = {};
var DATA = {}, TASKS = [], NOTE = '';

function parseJwt(token){
  var b = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(b).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join('')));
}
function show(id){
  ['view-login','view-loading','view-denied','view-error','view-app'].forEach(function(v){
    document.getElementById(v).classList.toggle('hidden', v !== id);
  });
}
function saveSession(s){ s.expiry = Date.now()+SESSION_HOURS*3600*1000; localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
function getSession(){ try{ var s=JSON.parse(localStorage.getItem(SESSION_KEY)); if(!s||Date.now()>s.expiry){localStorage.removeItem(SESSION_KEY);return null;} return s; }catch(e){return null;} }
function handleGoogleSignIn(r){
  var p = parseJwt(r.credential);
  SESSION = { email:p.email, name:p.name||p.email, picture:p.picture||'' };
  saveSession(SESSION); loadData(SESSION);
}
function handleLogout(){
  localStorage.removeItem(SESSION_KEY);
  if(window.google && google.accounts && google.accounts.id) google.accounts.id.disableAutoSelect();
  show('view-login');
}
function displayUserInfo(s){
  document.getElementById('u-name').textContent = s.name;
  var img = document.getElementById('u-pic');
  if(s.picture){ img.src=s.picture; img.style.display=''; } else { img.style.display='none'; }
}
function loadData(session){
  SESSION = session; show('view-loading');
  fetch(APPS_SCRIPT_URL + '?email=' + encodeURIComponent(session.email))
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(!res.authorized){ show('view-denied'); return; }
      DONE_MAP = res.doneMap || {};
      DATA = res.data || {}; TASKS = res.tasks || []; NOTE = res.note || '';
      displayUserInfo(session);
      render();
      show('view-app');
    })
    .catch(function(e){
      document.getElementById('error-msg').textContent = '連線發生問題：' + e.message;
      show('view-error');
    });
}
/* 穩定 ID：專案+任務名 雜湊，跨天不變 */
function stableId(t){
  if(t.id) return t.id;
  var s = (t.proj||'') + '|' + (t.name||'');
  var h = 5381;
  for(var i=0;i<s.length;i++){ h = ((h<<5)+h) + s.charCodeAt(i); h = h & 0xffffffff; }
  return 't' + (h>>>0).toString(36);
}
function isDone(t){ return DONE_MAP[stableId(t)] === true; }

function postToggle(id, done, name, proj){
  fetch(APPS_SCRIPT_URL, {
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({ action:'toggle', id:id, done:done, name:name, proj:proj, email:SESSION.email })
  }).then(function(r){return r.json();})
    .then(function(res){ toast(res.ok ? (done?'完成！已收進今日完成':'已移回待辦') : '儲存失敗：'+(res.error||'')); })
    .catch(function(){ toast('儲存失敗（連線問題）'); });
}
/* 勾選：先動畫、寫入 DONE_MAP、POST，再重繪把它移到今日完成 */
function markDone(id, name, proj, cb){
  DONE_MAP[id] = true;
  postToggle(id, true, name, proj);
  var li = cb.closest('li');
  if(li){ li.classList.add('leaving'); setTimeout(render, 260); } else { render(); }
}
function undoDone(id, name, proj){
  DONE_MAP[id] = false;
  postToggle(id, false, name, proj);
  render();
}
function esc(s){ var d=document.createElement('div'); d.textContent=(s==null?'':String(s)); return d.innerHTML; }
function attr(s){ return String(s==null?'':s).replace(/"/g,'&quot;'); }

/* 上方待辦卡片（只給「未完成」用）*/
function todoCard(t){
  var id = stableId(t);
  var h = '<li data-id="'+attr(id)+'">';
  h += '<input type="checkbox" onchange="markDone(\''+attr(id)+'\',this.dataset.n,this.dataset.p,this)" data-n="'+attr(t.name)+'" data-p="'+attr(t.proj||'')+'">';
  h += '<span class="text"><span class="title-line">';
  h += '<span class="priority p-'+esc(t.priority||'reply')+'">'+esc(t.priorityLabel||'回覆')+'</span>';
  if(t.proj) h += '<span class="proj">'+esc(t.proj)+'</span>';
  h += '<span class="task-name">'+esc(t.name)+'</span>';
  if(t.srcDm) h += '<span class="src-dm">'+esc(t.srcDm)+'</span>';
  h += '</span><span class="meta">';
  (t.rows||[]).forEach(function(r){ h += '<span class="row"><span class="label">'+esc(r.label)+'</span><span class="value">'+esc(r.value)+'</span></span>'; });
  if(t.note || t.noteLink){
    h += '<span class="note">'+esc(t.note||'');
    if(t.noteLink) h += (t.note?' · ':'')+'<a href="'+attr(t.noteLink)+'" target="_blank">原訊息 ↗</a>';
    h += '</span>';
  }
  h += '</span></span></li>';
  return h;
}
/* 今日完成卡片（可取消勾選送回上方）*/
function doneCard(t){
  var id = stableId(t);
  var h = '<li><input type="checkbox" checked onchange="undoDone(\''+attr(id)+'\',this.dataset.n,this.dataset.p)" data-n="'+attr(t.name)+'" data-p="'+attr(t.proj||'')+'">';
  h += '<span class="text"><span class="title-line">';
  if(t.proj) h += '<span class="proj">'+esc(t.proj)+'</span>';
  h += '<span class="task-name">'+esc(t.name)+'</span></span></span></li>';
  return h;
}

function statusColor(s){
  s = String(s||'');
  if(s.indexOf('緊急')>=0) return 'urgent';
  if(s.indexOf('今天')>=0||s.indexOf('明天')>=0) return 'today';
  if(s.indexOf('完成')>=0) return 'low';
  if(s.indexOf('等')>=0) return 'wait';
  return 'soon';
}

function render(){
  var d = DATA;
  document.getElementById('updated').textContent = '最後更新：' + (d.updated||'') + ' ・ 資料來源：Slack ＋ Google Calendar';
  var c = '';
  var doneToday = []; // 收集今天勾掉的
  var activeCount = 0;

  // 把 tasks 轉成 todo 結構
  var taskItems = (TASKS||[]).map(function(t){ return { id:t.id, priority:statusColor(t.status), priorityLabel:t.status||'任務', proj:t.proj, name:t.name, rows: t.due?[{label:'交件日期',value:t.due}]:[], note:t.note }; });

  // === 本週行程與待辦 ===
  var daysHtml = '';
  (d.days||[]).forEach(function(day){
    var activeTodos = (day.todos||[]).filter(function(t){ if(isDone(t)){doneToday.push(t);return false;} return true; });
    var hasMeet = day.meetings && day.meetings.length;
    if(!hasMeet && !activeTodos.length) return; // 沒會議也沒待辦就整天略過
    daysHtml += '<div class="date-section"><div class="date-header">'+esc(day.date)+' <span class="wk">'+esc(day.weekday||'')+'</span></div>';
    if(hasMeet){
      daysHtml += '<ul class="meeting-list">';
      day.meetings.forEach(function(m){
        daysHtml += '<li><span class="meeting-time">'+esc(m.time)+'</span><span class="meeting-title">'+esc(m.title)+'</span>';
        if(m.link) daysHtml += '<a class="meeting-link" href="'+attr(m.link)+'" target="_blank">Meet ↗</a>';
        daysHtml += '</li>';
      });
      daysHtml += '</ul>';
    }
    if(activeTodos.length){ activeCount+=activeTodos.length; daysHtml += '<ul class="todo-list">'+activeTodos.map(todoCard).join('')+'</ul>'; }
    daysHtml += '</div>';
  });
  if(daysHtml){ c += '<h2 class="sec">📅 本週行程與待辦</h2>' + daysHtml; }

  // === 修改 ===
  var revActive = (d.revise||[]).filter(function(t){ if(isDone(t)){doneToday.push(t);return false;} return true; });
  if(revActive.length){ activeCount+=revActive.length; c += '<h2 class="sec">✏️ 修改</h2><ul class="todo-list">'+revActive.map(todoCard).join('')+'</ul>'; }

  // === 記得回覆 ===
  var repActive = (d.reply||[]).filter(function(t){ t.priority='reply'; t.priorityLabel='回覆'; if(isDone(t)){doneToday.push(t);return false;} return true; });
  if(repActive.length){ activeCount+=repActive.length; c += '<h2 class="sec">💬 記得回覆</h2><ul class="todo-list">'+repActive.map(todoCard).join('')+'</ul>'; }

  // === 任務總覽 ===
  var taskActive = taskItems.filter(function(t){ if(isDone(t)){doneToday.push(t);return false;} return true; });
  if(taskActive.length){ activeCount+=taskActive.length; c += '<h2 class="sec">📌 任務總覽</h2><ul class="todo-list">'+taskActive.map(todoCard).join('')+'</ul>'; }

  // === 都清空了 ===
  if(activeCount===0){ c += '<div class="clear-note">🎉 目前沒有待處理的事項，全部清乾淨了！</div>'; }

  // === ✅ 今日完成（收合，可取消）===
  if(doneToday.length){
    c += '<details class="fold"'+(activeCount===0?' open':'')+'><summary>✅ 今日完成（'+doneToday.length+'）<span class="arw">▾</span></summary><div class="fold-body"><ul class="done-list">'+doneToday.map(doneCard).join('')+'</ul></div></details>';
  }

  // === 📝 今日筆記（放最後）===
  var today = new Date(); var ds = today.getFullYear()+'-'+('0'+(today.getMonth()+1)).slice(-2)+'-'+('0'+today.getDate()).slice(-2);
  c += '<details class="fold"><summary>📝 今日筆記（'+ds+'）<span class="arw">▾</span></summary><div class="fold-body">'+
       '<div class="note-box"><textarea id="note-text" placeholder="隨手記今天的事件、決定、想法…存進 Google Sheets">'+esc(NOTE)+'</textarea>'+
       '<div class="note-actions"><button onclick="saveNote()">儲存筆記</button><span class="note-status" id="note-status"></span></div></div></div></details>';

  // === 📦 歷史封存 ===
  var months = Object.keys(d.completed||{}), archHtml='';
  months.forEach(function(m){
    var items = d.completed[m];
    if(items && items.length){ archHtml += '<div class="done-month"><h4>'+esc(m)+'</h4><ul>'+items.map(function(t){return '<li>'+esc(typeof t==='string'?t:((t.proj?t.proj+' ':'')+t.name))+'</li>';}).join('')+'</ul></div>'; }
  });
  if(archHtml){ c += '<details class="fold"><summary>📦 歷史封存<span class="arw">▾</span></summary><div class="fold-body">'+archHtml+'</div></details>'; }

  document.getElementById('content').innerHTML = c;
  renderStats(d.stats||{}, activeCount, doneToday.length);
}
function renderStats(s, active, done){
  document.getElementById('progress').innerHTML =
    '<div class="stat"><span class="num">'+active+'</span><span class="lbl">待處理</span></div>'+
    '<div class="stat"><span class="num">'+done+'</span><span class="lbl">今日完成</span></div>'+
    '<div class="stat"><span class="num">'+(s.reply||0)+'</span><span class="lbl">記得回覆</span></div>'+
    '<div class="stat"><span class="num">'+(s.meetings||0)+'</span><span class="lbl">本週會議</span></div>'+
    '<div class="bar"><i style="width:'+((active+done)?(done/(active+done)*100).toFixed(0):0)+'%"></i></div>';
}
function saveNote(){
  var text = document.getElementById('note-text').value;
  var st = document.getElementById('note-status'); st.textContent = '儲存中…';
  var today = new Date(); var ds = today.getFullYear()+'-'+('0'+(today.getMonth()+1)).slice(-2)+'-'+('0'+today.getDate()).slice(-2);
  fetch(APPS_SCRIPT_URL, {
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({ action:'savenote', date:ds, text:text, email:SESSION.email })
  }).then(function(r){return r.json();})
    .then(function(res){ st.textContent = res.ok ? ('已存到 Sheets · '+new Date().toLocaleTimeString('zh-TW')) : ('儲存失敗：'+(res.error||'')); NOTE=text; })
    .catch(function(){ st.textContent = '儲存失敗（連線問題）'; });
}
var _tmr;
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(_tmr); _tmr=setTimeout(function(){t.classList.remove('show');},1800); }

window.addEventListener('load', function(){
  var s = getSession();
  if(s){ loadData(s); } else { show('view-login'); }
});
</script>
